<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style/style.css">

</head>

<body>

    <!-- Barra di navigazione -->

    <nav class="navbar navbar-expand-lg  height navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"> <img class="height-img" src="./img/duck.png" alt=""></a>
            <button class="navbar-toggler " type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse " id="navbarNavAltMarkup">

                <div class="navbar-nav col">
                    <a class="nav-link active " aria-current="page" href="./index.html">Catalogo Libri</a>
                    <a class="nav-link " href="# ">Anagrafica Utenti</a>
                    <a class="nav-link " href="#">Storico Prestiti</a>
                    <a class="nav-link " aria-disabled="true">help</a>
                </div>

            </div>
        </div>
    </nav>

    <!-- container per poterli dividere per versione mobile e desktop -->

    <div class="container ">
        <div class="row space-between my-4">
            <h2 class="mb-4">Nuovo Libro</h2>

            <!-- Form per inserire le caratteristiche dei libri-->

            <form class="needs-validation row">
                <div class="mb-3 col-6">
                    <label for="NomeAutore" class="form-label">Nome Autore</label>
                    <input type="text" class="form-control" id="NomeAutore" required placeholder="Inserisci il nome dell'autore">
                    <div class="invalid-feedback">Inserisci nome autore.</div>
                </div>

                <div class="mb-3 col-6">
                    <label for="CognomeAutore" class="form-label">cognome Autore</label>
                    <input type="text" class="form-control" id="CognomeAutore" required placeholder="Inserisci il cognome dell'autore">
                    <div class="invalid-feedback">Inserisci nome autore.</div>
                </div>

                <div class="mb-3 col-12">
                    <label for="Titolo" class="form-label">Titolo</label>
                    <input type="text" class="form-control" id="Titolo" required placeholder="Inserisci il titolo del libro">
                    <div class="invalid-feedback">Inserisci nome autore.</div>
                    <p class="opacity">Titolo versione italiana</p>
                </div>

                <div class="mb-3 col-12 col-lg-4">
                    <label for="Genere" class="form-label">Genere</label>
                    <select class="form-select" id="Genere" required>
                        <option selected disabled value="">Scegli il genere</option>
                        <option value="1">Fantasy</option>
                        <option value="2">Horror</option>
                        <option value="3">novel</option>
                    </select>
                </div>

                <div class="mb-3 col-12 col-lg-4">
                    <label for="AnnoPublicazione" class="form-label">Anno di Pubblicazione</label>
                    <input type="date" class="form-control" id="AnnoPublicazione" required min="1000-01-01" placeholder="Inserisci il codice ISBN#">
                    <div class="invalid-feedback">Inserisci nome autore.</div>
                </div>

                <div class="mb-3 col-12 col-lg-4">
                    <label for="Codice" class="form-label">ISBN#</label>
                    <input type="text" class="form-control" id="Codice" required placeholder="Inserisci il codice ISBN#">
                    <div class="invalid-feedback">Inserisci nome autore.</div>
                </div>

                <div class="border-bottom my-4 linea-divisoria"></div>

                <div class="mb-3">
                    <label for="note" class="form-label">Note</label>
                    <textarea class="form-control" id="note" rows="3"></textarea>
                    <div class="invalid-feedback">Inserisci note sul libro.</div>
                </div>

                <div class="mb-3 ms-3 form-check">
                    <input type="checkbox" class="form-check-input" id="disponibile" required>
                    <label class="form-check-label" for="disponibile">Disponibile in digitale</label>
                </div>
                <button type="submit" class="btn btn-primary col-4 ms-3">Aggiungi libro</button>
            </form>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
    </script>
    
</body>
</html>
